<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Ticket Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
    <link href="css/box-office.css" rel="stylesheet">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #009639;">
        <div class="container">
            <img src="images/buford-favicon.ico" alt="Buford Wolf">
            <a class="navbar-brand text-white fw-bold" href="index.html">Buford Arena</a>
            <button class="navbar-toggler border-white" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" 
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span> 
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link text-white" href="calendar.html">Calendar</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="box-office.html">Box Office</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="information.html">Information</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="planner.html">Arena Planner</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="cite.html">Citations</a></li>
                </ul>
            </div>
        </div>
    </nav>
    

    <!-- Ticket Booking Form -->
    <div class="ticket-form">
        <h3 class="text-center mb-4">Purchase Tickets</h3>
        <form id="ticketForm">
            <!-- Event Selection -->
            <div class="mb-3">
                <label for="eventSelect" class="form-label">Select Event</label>
                <select class="form-select" id="eventSelect" required>
                    <option value="" selected disabled>Choose an event...</option>
                    <option value="Concert">Concert</option>
                    <option value="Mens-Basketball">Men's Basketball</option>
                    <option value="Womens-Basketball">Women's Basketball</option>
                </select>
            </div>

            <!-- Number of Tickets -->
            <br>
            <div class="mb-3">
                <label class="form-label">Number of Tickets</label>
                <div class="d-flex justify-content-between">
                    <div class="w-50 pe-2">
                        <label for="adultTickets" class="form-label">Adults</label>
                        <input type="number" class="form-control" id="adultTickets" min="0" value="0" required>
                    </div>
                    <div class="w-50 ps-2">
                        <label for="childTickets" class="form-label">Children</label>
                        <input type="number" class="form-control" id="childTickets" min="0" value="0" required>
                    </div>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn btn-primary mt-3">Purchase Tickets</button>
        </form>
    </div>

    <script>
        document.getElementById("ticketForm").addEventListener("submit", function(event) {
            event.preventDefault(); // Prevent page reload
            
            let eventName = document.getElementById("eventSelect").value;
            let adults = document.getElementById("adultTickets").value;
            let children = document.getElementById("childTickets").value;

            if (!eventName) {
                alert("Please select an event.");
                return;
            }

            alert(`🎟️ Transaction Processed!\n\nEvent: ${eventName}\nAdult Tickets: ${adults}\nChild Tickets: ${children}`);
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
