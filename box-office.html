<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Ticket Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <script src="https://kit.fontawesome.com/0ecee0f13d.js" crossorigin="anonymous"></script>
    <link rel="icon" type="image/x-icon" href="/images/buford-favicon.ico">
    <style>
        /* Custom Theme Colors */
        :root {
            --main-color: #009639;
            --accent-color: #B3A369;
            --light-bg: #f8f9fa;
            --white: #ffffff;
        }

        /* Navbar Styling */
        .navbar {
            background-color: var(--main-color);
        }

        .navbar-brand {
            color: var(--white) !important;
            font-weight: bold;
        }

        .nav-link {
            color: var(--white) !important;
        }

        /* Ticket Form Container */
        body {
            background-color: var(--light-bg);
        }

        .ticket-form {
            max-width: 500px;
            margin: 80px auto 50px auto;
            background: var(--white);
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            border-top: 5px solid var(--main-color);
        }

        .btn-primary {
            background-color: var(--main-color);
            border: none;
        }

        .btn-primary:hover {
            background-color: var(--accent-color);
        }

        /* Total Price Box */
        .total-box {
            background-color: #f8f9fa; /* Light gray background */
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            border: 2px solid #009639; /* Green border */
            color: #009639;
            margin-top: 10px;
        }
    </style>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FN72NQPVD7"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-FN72NQPVD7');
    </script>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #009639;">
        <div class="container">
            <img src="images/buford-favicon.ico" alt="Buford Wolf">
            <a class="navbar-brand text-white fw-bold" href="index.html">Buford Arena</a>
            <button class="navbar-toggler border-white" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" 
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span> 
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link text-white" href="calendar.html"><i class="fa-solid fa-calendar"></i> Calendar</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="box-office.html"><i class="fa-solid fa-ticket"></i> Box Office</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="information.html"><i class="fa-solid fa-circle-info"></i> Information</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="planner.html"><i class="fa-solid fa-envelope"></i> Arena Planner</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="cite.html"><i class="fa-regular fa-rectangle-list"></i> Citations</a></li>
                </ul>
            </div>
        </div>
    </nav>
    

    <!-- Ticket Booking Form -->
    <div class="ticket-form">
        <h3 class="text-center mb-4">Purchase Tickets</h3>
        <form id="ticketForm">
            <!-- Event Selection -->
            <div class="mb-3">
                <label for="eventSelect" class="form-label">Select Event</label>
                <select class="form-select" id="eventSelect" required>
                    <option value="" selected disabled>Choose an event...</option>
                    <option value="Concert">Concert</option>
                    <option value="Mens-Basketball">Men's Basketball</option>
                    <option value="Womens-Basketball">Women's Basketball</option>
                </select>
            </div>

            <!-- Number of Tickets -->
            <br>
            <div class="mb-3">
                <label class="form-label">Number of Tickets</label>
                <div class="d-flex justify-content-between">
                    <div class="w-50 pe-2">
                        <label for="adultTickets" class="form-label">Adults - $10</label>
                        <input type="number" class="form-control" id="adultTickets" min="0" value="0" required>
                    </div>
                    <div class="w-50 ps-2">
                        <label for="childTickets" class="form-label">Children - $5</label>
                        <input type="number" class="form-control" id="childTickets" min="0" value="0" required>
                    </div>
                </div>
            </div>

             <!-- Price Calculation Section -->
             <br>
             <div class="mb-3">
                <div class=total-box>
                    <h5 class="text-left">Total: $<span id="totalPrice">0</span></h5>
                </div>
            </div>

            <button type="submit" class="btn btn-primary mt-3">Purchase Tickets</button>
        </form>
    </div>

    <!-- Footer -->
    <footer style="background-color: #B3A369; color: white; text-align: center; padding: 20px; width: 100%;">
        <p>&copy; 2024 Buford Arena. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function updateTotal() {
            let adultCount = parseInt(document.getElementById("adultTickets").value) || 0;
            let childCount = parseInt(document.getElementById("childTickets").value) || 0;
            let total = (adultCount * 10) + (childCount * 5);
            document.getElementById("totalPrice").textContent = total;
        }

        // Event Listeners for Ticket Input Fields
        document.getElementById("adultTickets").addEventListener("input", updateTotal);
        document.getElementById("childTickets").addEventListener("input", updateTotal);

        // Handle Form Submission
        document.getElementById("ticketForm").addEventListener("submit", function(event) {
            event.preventDefault();
            let eventName = document.getElementById("eventSelect").value;
            let adults = document.getElementById("adultTickets").value;
            let children = document.getElementById("childTickets").value;
            let total = document.getElementById("totalPrice").textContent;

            if (!eventName) {
                alert("Please select an event.");
                return;
            }

            alert(`Transaction Processed!\n\nEvent: ${eventName}\nAdult Tickets: ${adults}\nChild Tickets: ${children}\nTotal: $${total}`);
        });
    </script>
</body>
</html>
